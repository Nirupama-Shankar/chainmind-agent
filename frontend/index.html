<!DOCTYPE html>
<html>

<head>

<title>ChainMind AI Governance Agent</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
border-radius:8px;
padding:10px;
}

button{
padding:10px 20px;
margin-top:10px;
margin-right:10px;
border:none;
border-radius:6px;
background:#6366f1;
color:white;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

.proposal{
background:#334155;
padding:15px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>


<body>

<div class="container">

<h1>🤖 ChainMind AI Governance Agent</h1>

<div class="card">

<h3>Describe a situation</h3>

<textarea id="input"></textarea>

<br>

<button onclick="startVoice()">🎤 Speak</button>
<button onclick="generateProposal()">Generate Proposal</button>
<button onclick="submitProposal()">Submit to Blockchain</button>
<button onclick="loadProposals()">View DAO Proposals</button>

</div>


<div class="card">

<h3>AI Governance Output</h3>

<div id="result"></div>

</div>


<div class="card">

<h3>DAO Proposals (On-chain)</h3>

<div id="proposals"></div>

</div>

</div>


<script>

async function generateProposal(){

const input=document.getElementById("input").value

const response=await fetch("http://127.0.0.1:5000/analyze",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({input})

})

const data=await response.json()

document.getElementById("result").innerText=data.response

}


async function submitProposal(){

const proposal=document.getElementById("result").innerText

const response=await fetch("http://127.0.0.1:5000/submit",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({proposal})

})

const data=await response.json()

alert("Stored on blockchain!\nTX: "+data.tx)

loadProposals()

}


async function loadProposals(){

const response = await fetch("http://127.0.0.1:5000/proposals")
const data = await response.json()

let html=""

if(data.length === 0){
html = "<p>No proposals yet.</p>"
}

data.forEach(p => {

html += `
<div class="proposal">
<h4>Proposal ${p.id}</h4>
<p>${p.description}</p>
<p><b>Votes:</b> ${p.votes}</p>
</div>
`

})

document.getElementById("proposals").innerHTML = html
}

function startVoice(){

const recognition=new webkitSpeechRecognition()

recognition.onresult=function(event){

document.getElementById("input").value=
event.results[0][0].transcript

}

recognition.start()

}

</script>


</body>
</html>
